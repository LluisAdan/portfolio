<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040816"/>
      <stop offset="55%" stop-color="#09152f"/>
      <stop offset="100%" stop-color="#07101f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="22%" r="75%">
      <stop offset="0%" stop-color="#dff3ff" stop-opacity="0.28"/>
      <stop offset="35%" stop-color="#7dd3fc" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9bdcff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="65%" stop-color="#d8efff"/>
      <stop offset="100%" stop-color="#9fdcff"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0.49
                0 1 0 0 0.83
                0 0 1 0 0.99
                0 0 0 0.30 0"/>
    </filter>
    <filter id="tinyGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <rect x="14" y="14" width="228" height="228" rx="56" fill="url(#bg)"/>
  <rect x="14" y="14" width="228" height="228" rx="56" fill="url(#glow)"/>
  <rect x="14.5" y="14.5" width="227" height="227" rx="55.5" fill="none" stroke="url(#stroke)" stroke-width="1.5"/>

  <!-- subtle tech grid -->
  <g opacity="0.10">
    <path d="M48 56H208M48 96H208M48 136H208M48 176H208" stroke="#9ecff5" stroke-width="1"/>
    <path d="M56 48V208M96 48V208M136 48V208M176 48V208" stroke="#9ecff5" stroke-width="1"/>
  </g>

  <!-- glow behind monogram -->
  <text x="128" y="152" text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="106" font-weight="800" letter-spacing="-7"
        fill="#7dd3fc" opacity="0.42" filter="url(#softGlow)">LA</text>

  <!-- monogram -->
  <text x="128" y="152" text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="106" font-weight="800" letter-spacing="-7"
        fill="url(#textGrad)">LA</text>

  <!-- accent underline -->
  <rect x="81" y="176" width="94" height="4" rx="2" fill="#7dd3fc" opacity="0.8" filter="url(#tinyGlow)"/>
</svg>
